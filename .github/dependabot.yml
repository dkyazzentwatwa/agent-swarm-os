version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/dashboard/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/dashboard/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/dashboard/frontend/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
